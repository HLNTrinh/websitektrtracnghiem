services:
  mongodb:
    image: mongo:7.0
    container_name: exam_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: examdb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - exam_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 8080                                              # ✅
      MONGO_URI: mongodb://admin:secret@mongodb:27017/examdb?authSource=admin
    ports:
      - "8080:8080"                                          # ✅
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - exam_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8080/api
    container_name: exam_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      # For the built frontend that runs in the user's browser, API calls
      # must target the host where the backend is exposed. Use localhost:8080
      # so the browser can reach the backend at http://localhost:8080/api.
      REACT_APP_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - exam_network

volumes:
  mongo_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  exam_network:
    driver: bridge